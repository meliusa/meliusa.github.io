<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js/jquery-3.6.0.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script>
        $(document).ready(function () {
            $("#check").click(function () {
                var jumlahhari = $("#jumlahhari").val();
                var type = $("#type").val();
                var totalharga = jumlahhari * type;
                var lantai = $("#lantai").val();
                var tambahanharga = 0;
                if (lantai > 0 && lantai < 6) {
                    tambahanharga = 0;
                } else if (lantai > 5) {
                    tambahanharga = 50000;
                }
                var totalhargasewa = totalharga + tambahanharga;
                document.getElementById("totaltransaksi").innerHTML = "total transaksi adalah " +
                    totalhargasewa;
                var potongan = 0;
                var diskon = $("#diskon").val();
                if (diskon == "member") {
                    potongan = totalhargasewa * 0.1;
                } else if (diskon == "promo_hut") {
                    potongan = 100000;
                } else if (diskon == "tidak_ada") {
                    potongan = 0;
                }
                document.getElementById("totaldiskon").innerHTML = "total diskon adalah " +
                    potongan;
                document.getElementById("yangharusdibayar").innerHTML =
                    "yang harus dibayarkan adalah " + (totalhargasewa - potongan);
            });
        });
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="margin-top: 10px">
        <a class="navbar-brand" href="#">Hotel Meliusa </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        Menu
                    </a>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <a class="dropdown-item" href="home.html">Halaman utama</a>
                        <a class="dropdown-item" href="cek_harga.html">Cek harga hotel</a>
                        <a class="dropdown-item" href="index.html">Logout</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="form-group">
            <form action="">
                <h1 style="text-align: center; margin-bottom: 50px;">Cek Harga</h1>
                <div class="form-group">
                    <label for="">Lantai</label>
                    <input type="text" name="" id="lantai" class="form-control">
                </div>
                <div class="form-group">
                    <label for="">Type</label>
                    <select name="" id="type" class="form-control">
                        <option value="300000">standart</option>
                        <option value="400000">superior</option>
                        <option value="500000">deluxe</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="">Jumlah Hari</label>
                    <input type="number" name="" id="jumlahhari" class="form-control">
                </div>
                <div class="form-group">
                    <label for="">Diskon</label>
                    <select name="" id="diskon" class="form-control">
                        <option value="member">member</option>
                        <option value="promo_hut">promo HUT</option>
                        <option value="tidak_ada">tidak ada</option>
                    </select>
                </div>

                <!-- Modal -->
                <div class="modal fade" id="exampleModalLong" tabindex="-1" role="dialog"
                    aria-labelledby="exampleModalLongTitle" aria-hidden="true">
                    <div class="modal-dialog" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLongTitle">Struk</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                            <div class="modal-body">
                                <p id="totaltransaksi"></p>
                                <p id="totaldiskon"></p>
                                <p id="yangharusdibayar"></p>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
        </div>

        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModalLong" id="check">
            Check
        </button>
        <input type="reset" value="Cancel" class="btn btn-success">
        </form>
    </div>






    </div>
    <nav class="navbar fixed-bottom navbar-expand-sm navbar-light bg-light">
        <p>Copyleft by Meliusa Nora Hariyanti</p>
    </nav>
</body>

</html>
